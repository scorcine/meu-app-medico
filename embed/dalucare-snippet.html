<!--
  Cole no site Dalucare (www.dalucare.com.br).

  1) Substitua getDalucareDoctorProfile() pelos dados reais do médico logado.
  2) O MedHub pede o perfil ao carregar (type: ready) e também aceita envio manual.
  3) O listener de resize ajusta a altura do iframe (evita scroll interno estreito).
  4) No CSS da página, NÃO use max-height no wrapper do iframe.
-->
<iframe
  id="medhub-rx-embed"
  src="https://www.medhub.ia.br/embed/prescricao.html?v=rx-20260722l"
  title="Receituário MedHub"
  style="display:block;width:100%;min-height:900px;height:900px;border:0;border-radius:12px;background:#fff;"
  loading="lazy"
  referrerpolicy="strict-origin-when-cross-origin"
  allow="clipboard-write"
></iframe>
<script>
(function () {
  var MEDHUB_ORIGIN = 'https://www.medhub.ia.br';
  var frame = document.getElementById('medhub-rx-embed');
  if (!frame) return;

  /** Troque esta função pelos dados do médico autenticado no Dalucare */
  function getDalucareDoctorProfile () {
    // Exemplo — use a sessão/API real do Dalucare:
    // return { name: user.nome, crmUf: user.crmUf, crmNumber: user.crm };
    return {
      name: window.DALUCARE_DOCTOR_NAME || '',
      crmUf: window.DALUCARE_DOCTOR_CRM_UF || 'SP',
      crmNumber: window.DALUCARE_DOCTOR_CRM || ''
    };
  }

  function sendDoctorToMedHub () {
    if (!frame.contentWindow) return;
    var profile = getDalucareDoctorProfile();
    if (!profile || (!profile.name && !profile.crmNumber)) return;
    frame.contentWindow.postMessage({
      source: 'dalucare',
      type: 'doctor-profile',
      profile: profile
    }, MEDHUB_ORIGIN);
  }

  window.addEventListener('message', function (event) {
    if (event.origin !== MEDHUB_ORIGIN) return;
    var data = event.data || {};
    if (data.source !== 'medhub-embed') return;

    if (data.type === 'resize' && data.height) {
      var h = Math.max(720, Number(data.height) || 0);
      frame.style.height = h + 'px';
      frame.style.minHeight = h + 'px';
    }

    // Embed pronto → envia nome/CRM automaticamente
    if (data.type === 'ready') {
      sendDoctorToMedHub();
    }
  });

  // Fallback se o ready chegar antes do listener
  frame.addEventListener('load', function () {
    setTimeout(sendDoctorToMedHub, 300);
  });
})();
</script>
