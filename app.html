<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu • MedHub</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
  <script defer src="auth.js"></script>
</head>
<body onload="initApp()">
  <header class="app-header">
    <h1>MedHub</h1>
    <div class="header-actions">
      <span id="user-name"></span>
      <button type="button" class="btn-outline" onclick="logout()">Sair</button>
    </div>
  </header>

  <main>
    <div class="card dashboard-card">
      <h2>Menu principal</h2>
      <p class="muted">Escolha uma opção para começar seu plantão.</p>
      <div class="menu-grid">
        <a href="#" class="menu-item">Pacientes</a>
        <a href="#" class="menu-item">Consultas</a>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 MedHub
  </footer>
</body>
</html>
