<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu App Médico</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #e8f4f8 0%, #f0f7ff 100%);
      color: #1a2b3c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0d6efd;
      color: white;
      padding: 1rem 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
      color: #0d6efd;
    }

    .card p {
      color: #5a6a7a;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .btn {
      display: inline-block;
      background: #0d6efd;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #0b5ed7;
    }

    footer {
      text-align: center;
      padding: 1rem;
      color: #7a8a9a;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Meu App Médico</h1>
  </header>

  <main>
    <div class="card">
      <div class="icon">🏥</div>
      <h2>Bem-vindo</h2>
      <p>
        Seu aplicativo médico está no ar. Aqui você poderá gerenciar consultas,
        pacientes e informações de saúde de forma simples e segura.
      </p>
      <a href="#" class="btn">Começar</a>
    </div>
  </main>

  <footer>
    &copy; 2026 Meu App Médico
  </footer>
</body>
</html>
