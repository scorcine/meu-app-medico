<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • MedHub</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script src="theme.js"></script>
  <link rel="stylesheet" href="style.css?v=theme-v1">

  <script defer src="app.js"></script>
  <script defer src="auth.js"></script>
</head>
<body onload="redirectIfLogged()">
  <header>MedHub</header>

  <form class="card" onsubmit="handleLogin(event)">
    <h1>Entrar</h1>

    <label for="email">E-mail</label>
    <input id="email" name="email" type="email" required>

    <label for="password">Senha</label>
    <input id="password" name="password" type="password" required>

    <button type="submit">Login</button>

    <a href="register.html">Não tem conta? Cadastre-se</a>
  </form>
</body>
</html>
