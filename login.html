<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login • MedHub</title>
  <link rel="icon" href="assets/medhub-logo.png?v=logo-v1" type="image/png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0d6efd">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MedHub">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <script src="theme.js"></script>
  <link rel="stylesheet" href="style.css?v=pwa-v1">
  <link rel="stylesheet" href="auth-mobile.css?v=auth-mobile-v1">

  <script defer src="security-crypto.js?v=session-v1"></script>
  <script defer src="legal-content.js"></script>
  <script defer src="compliance.js"></script>
  <script defer src="medhub-attribution.js?v=attr-v1"></script>
  <script defer src="subscription.js?v=billing-v3"></script>
  <script defer src="user-profile.js?v=profile-v12"></script>
  <script defer src="auth-cloud.js?v=cloud-v14"></script>
  <script defer src="auth.js?v=auth-v7"></script>
  <script defer src="pwa-install.js?v=pwa-v1"></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      const emailParam = new URLSearchParams(window.location.search).get('email');
      const emailInput = document.getElementById('email');
      if (emailParam && emailInput) emailInput.value = emailParam;
    });
  </script>
</head>
<body onload="redirectIfLogged()">
  <header class="auth-page-header">
    <a class="medhub-logo-link medhub-home-link" href="index.html" aria-label="MedHub — página inicial">
      <img src="assets/medhub-logo.png?v=logo-v1" alt="MedHub.ia.br" class="medhub-logo medhub-logo--auth" width="200" height="56">
    </a>
  </header>

  <form class="card" onsubmit="handleLogin(event)">
    <h1>Entrar</h1>
    <p class="auth-hint muted">Use o e-mail e a senha da sua assinatura MedHub Pro.</p>
    <label for="email">E-mail</label>
    <input id="email" name="email" type="email" required>

    <label for="password">Senha</label>
    <input id="password" name="password" type="password" required>

    <button type="submit">Login</button>

    <p class="auth-forgot-wrap">
      <a href="reset-password.html" class="auth-forgot-link">Esqueci minha senha</a>
    </p>

    <p class="auth-notice" role="note">
      Conta e assinatura na nuvem. Dados clínicos: sync criptografado opcional (mesma senha em outro aparelho).
    </p>

    <p class="auth-legal-links">
      <a href="termos.html">Termo de uso</a> · <a href="privacidade.html">Privacidade</a> · <a href="index.html#planos">Planos</a>
    </p>

    <a href="register.html">Não tem conta? Cadastre-se</a>
    <p class="auth-pricing-wrap">
      <a href="index.html#planos" class="auth-pricing-link">Assinar MedHub Pro (mensal ou anual)</a>
    </p>
  </form>
</body>
</html>
